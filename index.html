<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#5BC8F5">
  <title>시현이 놀이터 OS</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════
       COLOR SYSTEM & RESET
    ═══════════════════════════════════════ */
    :root {
      --sky-top:   #5BC8F5;
      --sky-mid:   #A8E6FF;
      --grass:     #7CB342;
      --grass-dark:#558B2F;
      --ink:       #1A2E3B;
      --white:     #FFFFFF;
      --primary:   #FF7A1A;
      --warning:   #FFD93D;
    }
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    html { height: 100%; overflow: hidden; }
    body {
      height: 100%; font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif;
      color: var(--ink); overflow: hidden; position: fixed; width: 100%;
      background: var(--sky-top);
    }
    button { border: 0; cursor: pointer; color: inherit; background: none; font: inherit; }
    button:focus { outline: none; }

    /* ═══════════════════════════════════════
       CONFETTI
    ═══════════════════════════════════════ */
    #particle-container { position: fixed; inset: 0; z-index: 9000; pointer-events: none; overflow: hidden; }
    .particle { position: absolute; border-radius: 4px; animation: confettiFall linear forwards; }
    @keyframes confettiFall {
      0%   { transform: translateY(-30px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh)  rotate(720deg); opacity: 0; }
    }

    /* ═══════════════════════════════════════
       APP SHELL & IMAGE MAP
    ═══════════════════════════════════════ */
    #sihyeonPlayOS { position: fixed; inset: 0; overflow: hidden; }

    .world-map-screen, .image-land-screen {
      position: absolute; inset: 0; overflow: hidden; z-index: 2;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(180deg, var(--sky-top) 0%, var(--grass-dark) 100%);
      animation: zoneEnter 0.35s cubic-bezier(0.25, 0.9, 0.3, 1) both;
    }
    .world-blur-bg {
      position: absolute; inset: -26px;
      background-image: var(--map-bg); background-size: cover; background-position: center;
      filter: blur(20px) saturate(1.08); transform: scale(1.08); opacity: 0.62; z-index: 0;
      pointer-events: none; /* ★ 수정: blur bg가 클릭 막지 않도록 */
    }
    .world-map-frame {
      position: relative; z-index: 1;
      height: 100dvh; aspect-ratio: 9/16; max-width: 100vw; max-height: 100dvh;
      overflow: hidden; background: var(--sky-top);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.18), 0 18px 48px rgba(0,0,0,0.18);
    }
    .world-map-bg {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: fill; z-index: 1; user-select: none; pointer-events: none;
    }
    /* ★ 수정: pointer-events:none 제거 → 자식 버튼이 정상적으로 클릭됨 */
    .world-map-content, .image-land-hotspots {
      position: absolute; inset: 0; z-index: 10;
    }

    /* ─── 존/핫스팟 버튼 ─── */
    .world-zone, .image-hotspot {
      position: absolute; transform: translate(-50%, -50%);
      background: rgba(255,255,255,0); border: 0; border-radius: 28px;
      cursor: pointer; z-index: 15; min-width: 64px; min-height: 64px;
      pointer-events: auto;
      touch-action: manipulation; /* ★ 수정: iOS 300ms 탭 딜레이 제거 */
    }
    .world-zone:active, .image-hotspot:active {
      background: rgba(255,255,255,0.18);
      transform: translate(-50%, -50%) scale(0.96);
    }

    /* ═══════════════════════════════════════
       ★ 존 레이블 (항상 표시)
    ═══════════════════════════════════════ */
    .zone-label {
      position: absolute;
      top: calc(100% + 5px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.68);
      color: #fff;
      padding: 5px 13px;
      border-radius: 20px;
      font-size: clamp(11px, 2.8vw, 15px);
      font-weight: 900;
      white-space: nowrap;
      backdrop-filter: blur(8px);
      border: 2px solid rgba(255,255,255,0.22);
      pointer-events: none;
      letter-spacing: 0.3px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.25);
    }

    .zone-emoji-fallback {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      font-size: clamp(34px, 8vw, 58px); display: none;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3); pointer-events: none;
    }
    .world-map-screen.map-fallback .zone-emoji-fallback,
    .image-land-screen.map-fallback .zone-emoji-fallback { display: block; }

    /* ─── 기차/아바타/캐릭터 ─── */
    .train-sprite {
      position: absolute; width: clamp(62px,13vw,94px); height: clamp(62px,13vw,94px);
      transform: translate(-50%,-50%);
      transition: left 1.15s cubic-bezier(0.4,0,0.2,1), top 1.15s cubic-bezier(0.4,0,0.2,1);
      z-index: 25; pointer-events: none; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.35));
      display: grid; place-items: center;
    }
    .train-emoji { font-size: clamp(54px,12vw,82px); line-height:1; z-index:2; }
    .train-sprite img { position:absolute; width:100%; height:100%; z-index:3; object-fit:contain; }

    .sihyeon-avatar {
      position: absolute; bottom: 2%; left: 50%; transform: translateX(-50%);
      width: clamp(64px,12vw,86px); height: clamp(64px,12vw,86px);
      background: #fff; border: 4px solid #fff; border-radius: 50%;
      box-shadow: 0 6px 12px rgba(0,0,0,0.25); z-index: 30; pointer-events: none;
      overflow: hidden; /* ★ 검정박스 방지 */
      transition: left 0.6s ease-in-out, top 0.6s ease-in-out, transform 0.25s ease;
    }
    /* ★ 아바타 이미지: 원형 꽉 채우기 */
    .sihyeon-avatar img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; border-radius: 50%;
      z-index: 3; display: block;
    }
    /* ★ 이모지 fallback: 이미지 없을 때만 보임 */
    .avatar-emoji {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      font-size: clamp(42px,9vw,56px);
      z-index: 2;
    }

    /* ★ 수정: translate 속성 사용 (transform의 scaleX 방향전환과 독립적으로 합성됨) */
    .sihyeon-avatar.is-walking {
      animation: avatarBounce 0.34s ease-in-out infinite;
    }
    @keyframes avatarBounce {
      0%, 100% { translate: 0 0px;   }
      50%       { translate: 0 -11px; }
    }

    .map-character, .land-character {
      position: absolute; transform: translate(-50%,-50%);
      width: clamp(54px,12vw,86px); height: clamp(54px,12vw,86px);
      border-radius: 50%; border: 4px solid rgba(255,255,255,0.96);
      background: rgba(255,255,255,0.72);
      box-shadow: 0 8px 14px rgba(0,0,0,0.22), inset 0 2px 0 rgba(255,255,255,0.65);
      display: grid; place-items: center; cursor: pointer; pointer-events: auto;
      transition: transform 0.15s ease, box-shadow 0.15s ease; overflow: hidden;
      touch-action: manipulation; /* ★ 추가 */
    }
    .map-character { z-index: 21; }
    .land-character { z-index: 18; }
    .map-character:active, .land-character:active {
      transform: translate(-50%,-50%) scale(0.92);
      box-shadow: 0 4px 8px rgba(0,0,0,0.2), inset 0 2px 0 rgba(255,255,255,0.65);
    }
    .map-character img, .land-character img, .land-sihyeon-runner img {
      width:100%; height:100%; object-fit:cover; border-radius:50%; display:block; pointer-events:none;
    }
    .character-emoji-fallback {
      position: absolute; inset:0; display:grid; place-items:center;
      font-size: clamp(34px,8vw,54px); background: rgba(255,255,255,0.86); pointer-events:none;
    }
    .map-character img:not([style*="display: none"]) + .character-emoji-fallback,
    .land-character img:not([style*="display: none"]) + .character-emoji-fallback,
    .land-sihyeon-runner img:not([style*="display: none"]) + .character-emoji-fallback { display:none; }

    /* ─── 캐릭터 이름 뱃지 ─── */
    .character-name-badge {
      position: absolute;
      top: calc(100% + 5px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.92);
      color: var(--ink);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: clamp(10px, 2.5vw, 13px);
      font-weight: 900;
      white-space: nowrap;
      box-shadow: 0 2px 6px rgba(0,0,0,0.18);
      pointer-events: none;
    }

    .land-sihyeon-runner {
      position: absolute; left:50%; top:88%; transform:translate(-50%,-50%);
      width: clamp(60px,12vw,84px); height: clamp(60px,12vw,84px);
      border-radius:50%; border:4px solid #fff; background:#fff;
      box-shadow:0 8px 14px rgba(0,0,0,0.24); z-index:26;
      display:grid; place-items:center; overflow:hidden; pointer-events:none;
      transition: left .85s cubic-bezier(0.25,0.9,0.3,1), top .85s cubic-bezier(0.25,0.9,0.3,1), transform .85s cubic-bezier(0.25,0.9,0.3,1);
    }
    .land-sihyeon-runner.is-moving { transform:translate(-50%,-50%) scale(1.06); }

    .mic-button-floating {
      position: absolute; bottom: calc(18px + env(safe-area-inset-bottom)); right: 18px;
      width: clamp(64px,12vw,78px); height: clamp(64px,12vw,78px);
      border-radius:50%; background:linear-gradient(135deg,#FF7A1A,#E65100);
      border:4px solid #fff; color:#fff; font-size:clamp(30px,7vw,38px);
      display:grid; place-items:center; box-shadow:0 8px 16px rgba(0,0,0,0.25); z-index:30;
      transition:transform .15s; touch-action: manipulation;
    }
    .mic-button-floating:active { transform:scale(0.92); }

    @media (min-aspect-ratio:9/16) { .world-map-frame { height:100dvh; width:auto; } }
    @media (max-aspect-ratio:9/16) { .world-map-frame { width:100vw; height:auto; } }

    /* ═══════════════════════════════════════
       FULLSCREEN ZONE BASE
    ═══════════════════════════════════════ */
    .fullscreen-zone {
      position:absolute; inset:0; display:flex; flex-direction:column; overflow:hidden; z-index:2;
      animation:zoneEnter 0.35s cubic-bezier(0.25,0.9,0.3,1) both;
    }
    @keyframes zoneEnter { from{opacity:0;transform:scale(0.96);} to{opacity:1;transform:scale(1);} }
    .zone-sky-bg { position:absolute; inset:0; z-index:0; }
    .deco-sun {
      position:absolute; top:18px; right:22px; width:88px; height:88px; border-radius:50%;
      background:radial-gradient(circle,#FFF176 0 38%,#FFD93D 40% 65%,transparent 66%);
      box-shadow:0 0 48px rgba(255,200,0,0.55); z-index:1; animation:sunPulse 4s ease-in-out infinite;
    }
    @keyframes sunPulse { 0%,100%{box-shadow:0 0 48px rgba(255,200,0,0.55);} 50%{box-shadow:0 0 72px rgba(255,200,0,0.75);} }

    .zone-head {
      position:relative; z-index:80; display:flex; align-items:center;
      padding: max(14px,env(safe-area-inset-top)) 16px 10px; flex-shrink:0; pointer-events:none;
    }
    .zone-home-btn {
      flex-shrink:0; padding:0 18px; height:56px; border-radius:28px;
      background:linear-gradient(180deg,#fff 0%,#ffe577 100%); border:4px solid #fff;
      font-size:22px; font-weight:900; color:var(--ink);
      display:flex; align-items:center; gap:6px;
      box-shadow:0 6px 0 rgba(0,0,0,0.18), 0 10px 20px rgba(0,0,0,0.1);
      transition:transform 0.1s, box-shadow 0.1s; pointer-events:auto;
      touch-action: manipulation;
    }
    .zone-home-btn:active { transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,0.18); }
    .zone-title { margin-left:auto; font-size:clamp(22px,5.5vw,34px); color:#fff; text-shadow:0 3px 0 rgba(0,0,0,0.2); }

    .zone-body {
      position:relative; z-index:5; flex:1; overflow-y:auto; overflow-x:hidden;
      padding:8px 14px max(16px,env(safe-area-inset-bottom));
    }
    .zone-body::-webkit-scrollbar { display:none; }

    /* ═══════════════════════════════════════
       ★ 존 랜드 — 캐릭터 스트립 + 말풍선
    ═══════════════════════════════════════ */
    .zone-character-strip {
      position:relative; z-index:10; flex-shrink:0;
      display:flex; align-items:flex-end; justify-content:flex-start;
      padding:10px 18px 0; gap:14px;
    }
    .zone-guide-avatar {
      width: clamp(68px,15vw,88px); height: clamp(68px,15vw,88px);
      border-radius:50%; border:4px solid #fff;
      box-shadow:0 6px 12px rgba(0,0,0,0.22); object-fit:cover; flex-shrink:0;
    }
    .zone-guide-avatar-emoji {
      width: clamp(68px,15vw,88px); height: clamp(68px,15vw,88px);
      border-radius:50%; border:4px solid #fff; background:rgba(255,255,255,0.9);
      box-shadow:0 6px 12px rgba(0,0,0,0.22); flex-shrink:0;
      display:grid; place-items:center; font-size:clamp(38px,9vw,52px);
    }
    .zone-speech-bubble {
      background:#fff; border-radius:18px 18px 18px 4px;
      padding:10px 16px;
      font-size:clamp(14px,3.8vw,19px); font-weight:700; color:var(--ink);
      box-shadow:0 4px 0 rgba(0,0,0,0.10); max-width:220px; line-height:1.4;
    }

    /* ═══════════════════════════════════════
       ★ 게임 카드 그리드 (스케일러블)
    ═══════════════════════════════════════ */
    .zone-game-grid {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
      gap:16px; padding:14px 0;
    }
    .zone-game-card {
      background:rgba(255,255,255,0.93); border-radius:24px;
      border:5px solid #fff;
      box-shadow:0 8px 0 rgba(0,0,0,0.13), 0 12px 22px rgba(0,0,0,0.10);
      padding:20px 12px 16px;
      display:flex; flex-direction:column; align-items:center; gap:10px;
      cursor:pointer; transition:transform 0.15s; min-height:160px;
      -webkit-tap-highlight-color:transparent;
      touch-action: manipulation;
    }
    .zone-game-card:active { transform:scale(0.94) translateY(5px); box-shadow:0 2px 0 rgba(0,0,0,0.13); }
    .zgc-icon { font-size:clamp(48px,13vw,72px); line-height:1; }
    .zgc-title { font-size:clamp(17px,4.5vw,24px); font-weight:900; color:var(--ink); text-align:center; }
    .zgc-desc { font-size:clamp(12px,3vw,15px); color:#777; text-align:center; line-height:1.3; }
    .zgc-new {
      position:absolute; top:-6px; right:-6px;
      background:#FF4444; color:#fff; font-size:11px; font-weight:900;
      padding:3px 8px; border-radius:10px; border:2px solid #fff;
    }
    .zone-game-card { position:relative; }

    /* ═══════════════════════════════════════
       GAME PLAY SCREEN
    ═══════════════════════════════════════ */
    .game-play-screen {
      position:fixed; inset:0; overflow:hidden; display:flex; flex-direction:column;
      background:var(--sky-top); z-index:2;
      animation:zoneEnter 0.35s cubic-bezier(0.25,0.9,0.3,1) both;
    }
    .game-play-body {
      flex:1; min-height:0; width:100%; max-width:1180px; margin:0 auto;
      padding:clamp(8px,2vw,24px); display:flex; align-items:stretch; justify-content:center; overflow:hidden;
    }
    .game-play-body > * { width:100%; min-height:0; }
    @media (max-width:520px) { .game-play-body { max-width:none; padding:8px; } }
    @media (min-width:768px) { .game-play-body { padding:22px; } }

    /* ═══════════════════════════════════════
       PLACEHOLDER ZONE
    ═══════════════════════════════════════ */
    .placeholder-body {
      flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:20px; text-align:center; padding:20px; position:relative; z-index:5;
    }
    .placeholder-icon {
      font-size:clamp(100px,30vw,180px); filter:drop-shadow(0 16px 0 rgba(0,0,0,0.15));
      animation:iconFloat 2.5s ease-in-out infinite;
    }
    @keyframes iconFloat { 0%,100%{transform:translateY(0) rotate(-2deg);} 50%{transform:translateY(-14px) rotate(2deg);} }
    .placeholder-text { font-size:clamp(22px,6vw,40px); color:#fff; text-shadow:0 3px 0 rgba(0,0,0,0.22); }

    /* ═══════════════════════════════════════
       GARAGE
    ═══════════════════════════════════════ */
    .garage-stage { position:absolute; inset:0; display:grid; place-items:center; }
    .garage-car-base { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); font-size:clamp(140px,38vw,240px); opacity:0.22; pointer-events:none; }
    .garage-target {
      position:absolute; left:50%; top:32%; transform:translate(-50%,-50%);
      width:clamp(144px,38vw,196px); height:clamp(144px,38vw,196px);
      display:grid; place-items:center; border:7px dashed #FFAA00; border-radius:28px;
      background:rgba(255,255,255,0.82); color:#CC7700; font-size:24px;
      box-shadow:inset 0 4px 0 rgba(255,255,255,0.7), 0 14px 0 rgba(0,0,0,0.12);
    }
    .garage-target.filled { border-style:solid; border-color:#4CAF50; background:rgba(255,255,255,0.96); }
    .garage-part {
      position:absolute; left:20px; bottom:80px; width:clamp(116px,28vw,150px); height:clamp(116px,28vw,150px);
      display:grid; place-items:center; font-size:clamp(90px,22vw,120px);
      user-select:none; touch-action:none; cursor:grab; filter:drop-shadow(0 12px 0 rgba(0,0,0,0.15)); z-index:4;
    }
    .garage-message {
      position:absolute; left:50%; bottom:20px; transform:translateX(-50%); width:min(92%,500px); min-height:64px;
      display:grid; place-items:center; padding:10px 20px; border-radius:20px;
      background:rgba(255,255,255,0.92); border:4px solid #fff; color:#1A4A60;
      font-size:clamp(18px,5vw,26px); text-align:center; box-shadow:0 8px 0 rgba(0,0,0,0.12);
    }

    /* ═══════════════════════════════════════
       STORY THEATER
    ═══════════════════════════════════════ */
    .story-bg { position:absolute; inset:0; z-index:0; background:linear-gradient(180deg,#2D0060 0%,#6A0DAD 35%,#FFD700 35%,#FF8C00 100%); }
    .story-stars { position:absolute; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
    .star { position:absolute; width:4px; height:4px; background:#fff; border-radius:50%; animation:starTwinkle 2s ease-in-out infinite; }
    @keyframes starTwinkle { 0%,100%{opacity:0.4;transform:scale(1);} 50%{opacity:1;transform:scale(1.6);} }

    .story-search-row {
      position:relative; z-index:10; padding:4px 14px 6px; flex-shrink:0;
    }
    .story-search-input {
      width:100%; height:52px; border-radius:26px;
      border:3px solid rgba(255,255,255,0.5);
      background:rgba(255,255,255,0.18);
      color:#fff; font-size:clamp(14px,4vw,18px);
      font-family:'Jua',sans-serif; font-weight:700;
      padding:0 18px 0 46px;
      backdrop-filter:blur(8px);
      transition:background 0.2s, border-color 0.2s;
    }
    .story-search-input::placeholder { color:rgba(255,255,255,0.65); }
    .story-search-input:focus { outline:none; background:rgba(255,255,255,0.28); border-color:rgba(255,255,255,0.8); }
    .story-search-icon {
      position:absolute; left:28px; top:50%; transform:translateY(-50%);
      font-size:22px; pointer-events:none;
    }

    .story-filter-row {
      position:relative; z-index:10; display:flex; gap:8px; overflow-x:auto;
      padding:0 14px 8px; scrollbar-width:none; flex-shrink:0;
    }
    .story-filter-row::-webkit-scrollbar { display:none; }
    .story-filter-btn {
      flex-shrink:0; min-width:72px; min-height:48px; padding:6px 12px; border-radius:16px;
      background:rgba(255,255,255,0.18); border:3px solid rgba(255,255,255,0.5); color:#fff;
      font-size:clamp(12px,3.5vw,15px); box-shadow:0 5px 0 rgba(0,0,0,0.15);
      transition:background 0.15s, transform 0.1s; touch-action: manipulation;
    }
    .story-filter-btn.active { background:rgba(255,255,255,0.95); color:#6A0DAD; }
    .story-filter-btn:active { transform:translateY(3px); }

    .story-card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:14px; }
    .story-card {
      min-height:220px; padding:14px; border-radius:20px; background:rgba(255,255,255,0.96);
      border:4px solid rgba(255,255,255,0.9); box-shadow:0 8px 0 rgba(90,0,140,0.2), 0 14px 24px rgba(60,0,100,0.14);
      display:flex; flex-direction:column; gap:8px; transition:transform 0.15s;
      touch-action: manipulation;

/* ═══════════════════════════════════════════
   UTILITY & DB
═══════════════════════════════════════════ */
function clone(v){ return JSON.parse(JSON.stringify(v)); }

function mergeDefaults(target, defaults){
  if(!target||typeof target!=='object') target={};
  Object.keys(defaults).forEach(key=>{
    const sv=defaults[key], tv=target[key];
    if(Array.isArray(sv)){ if(!Array.isArray(tv)) target[key]=[]; return; }
    if(sv&&typeof sv==='object'){ target[key]=mergeDefaults(tv,sv); return; }
    if(tv===undefined||tv===null) target[key]=sv;
  });
  return target;
}

function loadStoredDB(){
  try{
    const raw=localStorage.getItem(DB_KEY);
    if(!raw) return JSON.parse(JSON.stringify(DEFAULT_DB));
    return mergeDefaults(JSON.parse(raw), JSON.parse(JSON.stringify(DEFAULT_DB)));
  }catch(e){ return JSON.parse(JSON.stringify(DEFAULT_DB)); }
}

function loadDB(){ window.db=loadStoredDB(); return window.db; }
let db=loadDB(); window.db=db;
function getToday(){ return new Date().toISOString().slice(0,10); }
function escapeHtml(v){
  return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function refreshLegacyCompatibility(){
  db.progress=db.progress||{level:1,exp:0};
  db.playground=db.playground||{};
  db.playground.collection=Array.isArray(db.playground.collection)?db.playground.collection:[];
  db.playground.storyWorld=mergeDefaults(db.playground.storyWorld,clone(DEFAULT_DB.playground.storyWorld));
  db.settings=mergeDefaults(db.settings,clone(DEFAULT_DB.settings));
}
function save(){ refreshLegacyCompatibility(); localStorage.setItem(DB_KEY,JSON.stringify(db)); }

function isStoryPlaying(){ return Boolean(window.storyReadState&&window.storyReadState.isReading); }
function speakText(text,opts={}){
  if(!text||!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR'; u.rate=opts.rate||db.settings.voiceGuide.rate||0.85;
  u.pitch=opts.pitch||db.settings.voiceGuide.pitch||1.1;
  window.speechSynthesis.speak(u);
}
function speakGuide(text,force=false){
  if(!force&&isStoryPlaying()) return;
  if(!db.settings.voiceGuide.enabled) return;
  speakText(text,{rate:0.88,pitch:1.08});
}
function speakStory(text){ speakText(text,{rate:0.82,pitch:1.03}); }
function stopSpeaking(){ if('speechSynthesis' in window) window.speechSynthesis.cancel(); }

  const colors=['#FFD93D','#FF7A1A','#FF4D4D','#3478F6','#8E5CFF','#00C2A8','#FF7AC8'];

    fireConfetti(); speakGuide('레벨이 올라갔어! 시현이 최고!');
  }
  save();
}

  if(!db.playground.collection.includes(icon)){ db.playground.collection.push(icon); fireConfetti(); }

}

/* ═══════════════════════════════════════════
   ★ 핵심 수정: travelToZone + walkAvatarToZone
═══════════════════════════════════════════ */
function travelToZone(zoneId){
  const zone=WORLD_ZONES[zoneId];
  if(!zone) return;

  if(window.stopStoryReading) window.stopStoryReading(true);
  stopSpeaking();
  cleanupActiveGame();

  speakGuide(`시현이가 ${zone.label}으로 걸어가요! 하나 둘, 하나 둘!`, true);

  let entered = false;
  const safeEnter = () => {
    if(entered) return;
    entered = true;
    enterZone(zoneId);
  };

  // ★ 경로 길이에 맞게 타임아웃 계산 (스텝당 620ms + 여유 400ms)
  const pathLen = (ZONE_PATHS[zoneId]?.length || 2) - 1;
  const totalMs = pathLen * 620 + 400;

  walkAvatarToZone(zoneId, safeEnter);
  setTimeout(safeEnter, totalMs);
}

/* ★ 핵심 수정: 자연스러운 걷기 애니메이션 */
function walkAvatarToZone(zoneId, onComplete) {
  const avatar = document.getElementById('sihyeonAvatar');
  if (!avatar) { onComplete?.(); return; }

  const path = ZONE_PATHS[zoneId];
  if (!path || !path.length) { onComplete?.(); return; }

  // 1) transition 없이 시작점으로 순간이동
  avatar.style.transition = 'none';
  avatar.style.bottom    = 'auto';
  avatar.style.zIndex    = '35';
  avatar.style.left      = path[0].x;
  avatar.style.top       = path[0].y;
  avatar.style.transform = 'translate(-50%, -50%)';

  // 2) 리플로우 두 번 → transition 걸기 + 걷기 바운스 시작
  requestAnimationFrame(() => requestAnimationFrame(() => {
    avatar.classList.add('is-walking');
    let idx = 1;

    function step() {
      if (idx >= path.length) {
        avatar.classList.remove('is-walking');
        avatar.style.transform = 'translate(-50%, -50%) scale(1.06)';
        setTimeout(() => onComplete?.(), 150);
        return;
      }

      const wp   = path[idx];
      const prev = path[idx - 1];
      const goLeft = parseFloat(wp.x) < parseFloat(prev.x);

      // ★ 위치 이동 transition
      avatar.style.transition = 'left 0.6s ease-in-out, top 0.6s ease-in-out, transform 0.25s ease';
      avatar.style.left       = wp.x;
      avatar.style.top        = wp.y;
      // ★ 좌우 방향 전환 (mirror)
      avatar.style.transform  = `translate(-50%, -50%) scaleX(${goLeft ? -1 : 1})`;

      idx++;
      setTimeout(step, 620);
    }

    step();
  }));
}

  else if(zoneId==='game')    openGameLand();

function initGarageRound(){
  const stage=document.getElementById('garageStage');
  const target=document.getElementById('garageTarget');
  const part=document.getElementById('garagePart');
  const message=document.getElementById('garageMessage');
  if(!stage||!target||!part||!message) return;
  const carIcon=CARS[Math.floor(Math.random()*CARS.length)];
  part.textContent=carIcon; target.classList.remove('filled');
  target.textContent='여기에 쏙!'; message.textContent='자동차를 빈칸까지 끌고 가 보자!';
  part.style.cssText='left:20px;bottom:80px;transform:none;pointer-events:auto;';
  let dragging=false, pointerId=null;
  const movePart=(cx,cy)=>{
    const sr=stage.getBoundingClientRect(), pr=part.getBoundingClientRect();
    const nl=Math.max(0,Math.min(sr.width-pr.width,cx-sr.left-pr.width/2));
    const nt=Math.max(0,Math.min(sr.height-pr.height,cy-sr.top-pr.height/2));
    part.style.left=`${nl}px`; part.style.top=`${nt}px`; part.style.bottom='auto';
  };
  const onDown=(e)=>{ dragging=true; pointerId=e.pointerId; part.setPointerCapture(e.pointerId); movePart(e.clientX,e.clientY); };
  const onMove=(e)=>{ if(!dragging||e.pointerId!==pointerId) return; e.preventDefault(); movePart(e.clientX,e.clientY); };
  const onUp=(e)=>{
    if(!dragging||e.pointerId!==pointerId) return;
    dragging=false;
    if(part.hasPointerCapture(pointerId)) part.releasePointerCapture(pointerId);
    const tr=target.getBoundingClientRect(), pr2=part.getBoundingClientRect();
    const hit=!(pr2.right<tr.left-30||pr2.left>tr.right+30||pr2.bottom<tr.top-30||pr2.top>tr.bottom+30);
    if(!hit){ message.textContent='조금만 더 가까이!'; speakGuide('조금만 더 가까이 가 볼까?'); return; }
    target.classList.add('filled'); target.textContent=carIcon;
    part.style.pointerEvents='none';
    part.style.left=`${target.offsetLeft-part.offsetWidth/2}px`;
    part.style.top=`${target.offsetTop-part.offsetHeight/2}px`;
    part.style.transform='scale(1.2)';
    message.textContent='착! 자동차가 딱 맞았어! 🎉';
    fireConfetti(); speakGuide('착! 자동차가 딱 맞았어. 시현이 최고!');
    gainExp(15); unlockCar(carIcon);
    setTimeout(()=>{ if(document.getElementById('garageStage')) initGarageRound(); }, 1400);
  };
  part.addEventListener('pointerdown',onDown);
  part.addEventListener('pointermove',onMove);
  part.addEventListener('pointerup',onUp);
  part.addEventListener('pointercancel',onUp);
  garageCleanup=()=>{
    part.removeEventListener('pointerdown',onDown);
    part.removeEventListener('pointermove',onMove);
    part.removeEventListener('pointerup',onUp);
    part.removeEventListener('pointercancel',onUp);
  };
}

          placeholder="제목이나 주제 검색..."
          oninput="filterStoriesBySearch(this.value)"
          aria-label="동화 검색">
      </div>
      <nav id="storyFilterNav" class="story-filter-row">
        <button class="story-filter-btn active" data-theme="전체"      onclick="renderStoryGrid('전체')">📚 전체</button>
        <button class="story-filter-btn"        data-theme="자동차"    onclick="renderStoryGrid('자동차')">🚗 자동차</button>
        <button class="story-filter-btn"        data-theme="공룡"      onclick="renderStoryGrid('공룡')">🦕 공룡</button>
        <button class="story-filter-btn"        data-theme="동물"      onclick="renderStoryGrid('동물')">🐰 동물</button>
        <button class="story-filter-btn"        data-theme="우주"      onclick="renderStoryGrid('우주')">🚀 우주</button>
        <button class="story-filter-btn"        data-theme="바다"      onclick="renderStoryGrid('바다')">🌊 바다</button>
        <button class="story-filter-btn"        data-theme="전래"      onclick="renderStoryGrid('전래')">🏮 전래</button>
        <button class="story-filter-btn"        data-theme="이솝"      onclick="renderStoryGrid('이솝')">🌿 이솝</button>
        <button class="story-filter-btn"        data-theme="잠자리"    onclick="renderStoryGrid('잠자리')">🌙 잠자리</button>
        <button class="story-filter-btn"        data-theme="저장한 동화" onclick="renderStoryGrid('저장한 동화')">💖 저장</button>
      </nav>
      <div class="zone-body">
        <div id="storyLibraryGrid" class="story-card-grid"></div>
        <button class="story-load-more" id="storyLoadMoreBtn" style="display:none;" onclick="loadMoreStories()">
          📖 더 보기
        </button>
      </div>
      <!-- ★ 리더: zone-body 밖 → 전체화면 오버레이 -->
      <section id="storyReaderView" style="display:none; position:absolute; inset:0; z-index:50; overflow-y:auto; background:linear-gradient(180deg,#2D0060 0%,#6A0DAD 60%,#1A0040 100%); padding: max(14px,env(safe-area-inset-top)) 10px max(14px,env(safe-area-inset-bottom));">
        <div id="bookView"></div>
      </section>
    </div>`;

  if(window.renderStoryGrid) window.renderStoryGrid('전체');
  else setTimeout(()=>window.renderStoryGrid?.('전체'), 0);
  speakGuide('동화극장에 도착했어. 읽고 싶은 책을 골라봐!', true);
}

function filterStoriesBySearch(query){
  _renderStoryGridPage(window.currentStoryFilter || '전체', query.trim());
}

window._storyPage = 1;
function loadMoreStories(){
  window._storyPage = (window._storyPage||1) + 1;
  _renderStoryGridPage(window.currentStoryFilter || '전체');
}

/* ═══════════════════════════════════════════
   ★ 동화 그리드 직접 렌더링
   (story-world.js setStoryFilter 우회 — 테마/검색 완전 동작)
═══════════════════════════════════════════ */
const STORY_PAGE_SIZE = 12;

function _storyCoverEmoji(theme) {
  const t = String(theme || '');
  if (t.includes('자동차')) return '🚜';
  if (t.includes('공룡'))   return '🦖';
  if (t.includes('우주'))   return '🚀';
  if (t.includes('바다'))   return '🐳';
  if (t.includes('잠자리')) return '🌙';
  if (t.includes('전래'))   return '🐯';
  if (t.includes('이솝'))   return '🌿';
  if (t.includes('세계명작') || t.includes('명작')) return '🏰';
  if (t.includes('동물'))   return '🐰';
  return '📖';
}

function renderStoryGrid(theme) {
  window.currentStoryFilter = theme || '전체';
  window._storyPage = 1;
  document.querySelectorAll('[data-theme]').forEach(b => {
    b.classList.toggle('active', b.dataset.theme === (theme || '전체'));
  });
  const si = document.getElementById('storySearchInput');
  if (si) si.value = '';
  _renderStoryGridPage(theme, '');
}

function _renderStoryGridPage(theme, query) {
  const grid = document.getElementById('storyLibraryGrid');
  if (!grid) return;

  const reader = document.getElementById('storyReaderView');
  if (reader) { reader.style.display = 'none'; reader.classList.remove('active'); }
  grid.style.display = 'grid';
  grid.className = 'story-card-grid storybook-featured-grid';
  // story-world.js의 renderStorybookIntro가 숨겼을 수 있으므로 복원
  document.querySelector('.story-search-row')?.classList.remove('story-ui-hidden');
  document.querySelector('.story-filter-row')?.classList.remove('story-ui-hidden');

  const library = Array.isArray(window.STORY_LIBRARY) ? window.STORY_LIBRARY : [];
  const saved   = Array.isArray(db.playground.storyWorld.savedStories) ? db.playground.storyWorld.savedStories : [];
  const filter  = theme || window.currentStoryFilter || '전체';
  const q       = (query || '').trim().toLowerCase();
  const page    = window._storyPage || 1;

  let list;
  if (filter === '저장한 동화') {
    list = saved;
  } else {
    list = library.filter(s => {
      if (filter !== '전체' && !String(s.theme || '').includes(filter)) return false;
      if (q) {
        const haystack = (s.title + ' ' + (s.desc||'') + ' ' + (s.theme||'') + ' ' + (s.plotSeed||'')).toLowerCase();
        return haystack.includes(q);
      }
      return true;
    });
  }

  const total = list.length;
  const paged = list.slice(0, page * STORY_PAGE_SIZE);

  if (!paged.length) {
    grid.innerHTML = `<div class="story-empty">📚 "찾는 동화"가 없어요</div>`;
    const btn = document.getElementById('storyLoadMoreBtn');
    if (btn) btn.style.display = 'none';
    return;
  }

  grid.innerHTML = paged.map(story => {
    const id    = story.id || story.savedId;
    const emoji = _storyCoverEmoji(story.theme);
    const img   = story.coverImage || '';
    return `
      <button class="storybook-book-card" type="button"
        onclick="readStoryById('${escapeHtml(id)}')"
        aria-label="${escapeHtml(story.title)} 읽기">
        <span class="storybook-book-cover">
          ${img ? `<img src="${img}" alt="${escapeHtml(story.title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='grid';">` : ''}
          <span class="storybook-book-fallback" ${img?'style="display:none;"':''}>${emoji}</span>
        </span>
        <span class="storybook-book-title">${escapeHtml(story.title)}</span>
      </button>`;
  }).join('');

  const btn = document.getElementById('storyLoadMoreBtn');
  if (btn) btn.style.display = paged.length < total ? 'block' : 'none';
}
