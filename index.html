<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#5BC8F5">
  <title>시현이 놀이터 OS</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════
       COLOR SYSTEM & RESET
    ═══════════════════════════════════════ */
    :root {
      --sky-top:   #5BC8F5;
      --sky-mid:   #A8E6FF;
      --grass:     #7CB342;
      --grass-dark:#558B2F;
      --ink:       #1A2E3B;
      --white:     #FFFFFF;
      --primary:   #FF7A1A;
      --warning:   #FFD93D;
    }
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    html { height: 100%; overflow: hidden; }
    body {
      height: 100%; font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif;
      color: var(--ink); overflow: hidden; position: fixed; width: 100%;
      background: var(--sky-top);
    }
    button { border: 0; cursor: pointer; color: inherit; background: none; font: inherit; }
    button:focus { outline: none; }

    /* ═══════════════════════════════════════
       CONFETTI
    ═══════════════════════════════════════ */
    #particle-container { position: fixed; inset: 0; z-index: 9000; pointer-events: none; overflow: hidden; }
    .particle { position: absolute; border-radius: 4px; animation: confettiFall linear forwards; }
    @keyframes confettiFall {
      0%   { transform: translateY(-30px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh)  rotate(720deg); opacity: 0; }
    }

    /* ═══════════════════════════════════════
       APP SHELL & IMAGE MAP
    ═══════════════════════════════════════ */
    #sihyeonPlayOS { position: fixed; inset: 0; overflow: hidden; }

    .world-map-screen, .image-land-screen {
      position: absolute; inset: 0; overflow: hidden; z-index: 2;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(180deg, var(--sky-top) 0%, var(--grass-dark) 100%);
      animation: zoneEnter 0.35s cubic-bezier(0.25, 0.9, 0.3, 1) both;
    }
    .world-blur-bg {
      position: absolute; inset: -26px;
      background-image: var(--map-bg); background-size: cover; background-position: center;
      filter: blur(20px) saturate(1.08); transform: scale(1.08); opacity: 0.62; z-index: 0;
      pointer-events: none; /* ★ 수정: blur bg가 클릭 막지 않도록 */
    }
    .world-map-frame {
      position: relative; z-index: 1;
      height: 100dvh; aspect-ratio: 9/16; max-width: 100vw; max-height: 100dvh;
      overflow: hidden; background: var(--sky-top);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.18), 0 18px 48px rgba(0,0,0,0.18);
    }
    .world-map-bg {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: fill; z-index: 1; user-select: none; pointer-events: none;
    }
    /* ★ 수정: pointer-events:none 제거 → 자식 버튼이 정상적으로 클릭됨 */
    .world-map-content, .image-land-hotspots {
      position: absolute; inset: 0; z-index: 10;
    }

    /* ─── 존/핫스팟 버튼 ─── */
    .world-zone, .image-hotspot {
      position: absolute; transform: translate(-50%, -50%);
      background: rgba(255,255,255,0); border: 0; border-radius: 28px;
      cursor: pointer; z-index: 15; min-width: 64px; min-height: 64px;
      pointer-events: auto;
      touch-action: manipulation; /* ★ 수정: iOS 300ms 탭 딜레이 제거 */
    }
    .world-zone:active, .image-hotspot:active {
      background: rgba(255,255,255,0.18);
      transform: translate(-50%, -50%) scale(0.96);
    }

    /* ═══════════════════════════════════════
       ★ 존 레이블 (항상 표시)
    ═══════════════════════════════════════ */
    .zone-label {
      position: absolute;
      top: calc(100% + 5px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.68);
      color: #fff;
      padding: 5px 13px;
      border-radius: 20px;
      font-size: clamp(11px, 2.8vw, 15px);
      font-weight: 900;
      white-space: nowrap;
      backdrop-filter: blur(8px);
      border: 2px solid rgba(255,255,255,0.22);
      pointer-events: none;
      letter-spacing: 0.3px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.25);
    }

    .zone-emoji-fallback {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      font-size: clamp(34px, 8vw, 58px); display: none;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3); pointer-events: none;
    }
    .world-map-screen.map-fallback .zone-emoji-fallback,
    .image-land-screen.map-fallback .zone-emoji-fallback { display: block; }

    /* ─── 기차/아바타/캐릭터 ─── */
    .train-sprite {
      position: absolute; width: clamp(62px,13vw,94px); height: clamp(62px,13vw,94px);
      transform: translate(-50%,-50%);
      transition: left 1.15s cubic-bezier(0.4,0,0.2,1), top 1.15s cubic-bezier(0.4,0,0.2,1);
      z-index: 25; pointer-events: none; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.35));
      display: grid; place-items: center;
    }
    .train-emoji { font-size: clamp(54px,12vw,82px); line-height:1; z-index:2; }
    .train-sprite img { position:absolute; width:100%; height:100%; z-index:3; object-fit:contain; }

    .sihyeon-avatar {
      position: absolute; bottom: 2%; left: 50%; transform: translateX(-50%);
      width: clamp(64px,12vw,86px); height: clamp(64px,12vw,86px);
      background: #fff; border: 4px solid #fff; border-radius: 50%;
      box-shadow: 0 6px 12px rgba(0,0,0,0.25); z-index: 30; pointer-events: none;
      overflow: hidden; /* ★ 검정박스 방지 */
      transition: left 0.6s ease-in-out, top 0.6s ease-in-out, transform 0.25s ease;
    }
    /* ★ 아바타 이미지: 원형 꽉 채우기 */
    .sihyeon-avatar img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; border-radius: 50%;
      z-index: 3; display: block;
    }
    /* ★ 이모지 fallback: 이미지 없을 때만 보임 */
    .avatar-emoji {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      font-size: clamp(42px,9vw,56px);
      z-index: 2;
    }

    /* ★ 수정: translate 속성 사용 (transform의 scaleX 방향전환과 독립적으로 합성됨) */
    .sihyeon-avatar.is-walking {
      animation: avatarBounce 0.34s ease-in-out infinite;
    }
    @keyframes avatarBounce {
      0%, 100% { translate: 0 0px;   }
      50%       { translate: 0 -11px; }
    }

    .map-character, .land-character {
      position: absolute; transform: translate(-50%,-50%);
      width: clamp(54px,12vw,86px); height: clamp(54px,12vw,86px);
      border-radius: 50%; border: 4px solid rgba(255,255,255,0.96);
      background: rgba(255,255,255,0.72);
      box-shadow: 0 8px 14px rgba(0,0,0,0.22), inset 0 2px 0 rgba(255,255,255,0.65);
      display: grid; place-items: center; cursor: pointer; pointer-events: auto;
      transition: transform 0.15s ease, box-shadow 0.15s ease; overflow: hidden;
      touch-action: manipulation; /* ★ 추가 */
    }
    .map-character { z-index: 21; }
    .land-character { z-index: 18; }
    .map-character:active, .land-character:active {
      transform: translate(-50%,-50%) scale(0.92);
      box-shadow: 0 4px 8px rgba(0,0,0,0.2), inset 0 2px 0 rgba(255,255,255,0.65);
    }
    .map-character img, .land-character img, .land-sihyeon-runner img {
      width:100%; height:100%; object-fit:cover; border-radius:50%; display:block; pointer-events:none;
    }
    .character-emoji-fallback {
      position: absolute; inset:0; display:grid; place-items:center;
      font-size: clamp(34px,8vw,54px); background: rgba(255,255,255,0.86); pointer-events:none;
    }
    .map-character img:not([style*="display: none"]) + .character-emoji-fallback,
    .land-character img:not([style*="display: none"]) + .character-emoji-fallback,
    .land-sihyeon-runner img:not([style*="display: none"]) + .character-emoji-fallback { display:none; }

    /* ─── 캐릭터 이름 뱃지 ─── */
    .character-name-badge {
      position: absolute;
      top: calc(100% + 5px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.92);
      color: var(--ink);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: clamp(10px, 2.5vw, 13px);
      font-weight: 900;
      white-space: nowrap;
      box-shadow: 0 2px 6px rgba(0,0,0,0.18);
      pointer-events: none;
    }

    .land-sihyeon-runner {
      position: absolute; left:50%; top:88%; transform:translate(-50%,-50%);
      width: clamp(60px,12vw,84px); height: clamp(60px,12vw,84px);
      border-radius:50%; border:4px solid #fff; background:#fff;
      box-shadow:0 8px 14px rgba(0,0,0,0.24); z-index:26;
      display:grid
