<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#5BC8F5">
  <title>시현이 놀이터 OS</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%235BC8F5'/%3E%3Ccircle cx='22' cy='42' r='7' fill='%231A2E3B'/%3E%3Ccircle cx='44' cy='42' r='7' fill='%231A2E3B'/%3E%3Cpath d='M10 37h44l-5-15H24L15 31z' fill='%23FFD93D'/%3E%3Cpath d='M24 22h17l4 11H18z' fill='%23fff' opacity='.85'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <link rel="preload" as="image" href="./assets/world/park_main.webp">
  <link rel="preload" as="image" href="./assets/world/park_main_landscape.webp">
  <style>
    :root {
      --sky-top:#5BC8F5;
      --sky-mid:#A8E6FF;
      --grass:#7CB342;
      --grass-dark:#558B2F;
      --ink:#1A2E3B;
      --white:#FFFFFF;
      --primary:#FF7A1A;
      --warning:#FFD93D;
    }

    *, *::before, *::after {
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color:transparent;
      -webkit-touch-callout:none;
    }

    html { height:100%; overflow:hidden; }

    body {
      height:100%;
      width:100%;
      position:fixed;
      overflow:hidden;
      background:var(--sky-top);
      color:var(--ink);
      font-family:'Jua','Apple SD Gothic Neo',system-ui,sans-serif;
    }

    button {
      border:0;
      cursor:pointer;
      color:inherit;
      background:none;
      font:inherit;
      touch-action:manipulation;
    }

    button:focus { outline:none; }

    #particle-container {
      position:fixed;
      inset:0;
      z-index:9000;
      pointer-events:none;
      overflow:hidden;
    }

    .particle {
      position:absolute;
      border-radius:4px;
      animation:confettiFall linear forwards;
    }

    @keyframes confettiFall {
      0% { transform:translateY(-30px) rotate(0deg); opacity:1; }
      100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
    }

    #sihyeonPlayOS {
      position:fixed;
      inset:0;
      overflow:hidden;
    }

    .world-map-screen,
    .image-land-screen {
      position:absolute;
      inset:0;
      overflow:hidden;
      z-index:2;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg,var(--sky-top) 0%,var(--grass-dark) 100%);
      animation:zoneEnter .35s cubic-bezier(.25,.9,.3,1) both;
    }

    .world-blur-bg {
      position:absolute;
      inset:-26px;
      background-image:var(--map-bg);
      background-size:cover;
      background-position:center;
      filter:blur(20px) saturate(1.08);
      transform:scale(1.08);
      opacity:.62;
      z-index:0;
      pointer-events:none;
    }

    .world-map-frame {
      position:relative;
      z-index:1;
      height:100dvh;
      aspect-ratio:9/16;
      max-width:100vw;
      max-height:100dvh;
      overflow:hidden;
      background:var(--sky-top);
      box-shadow:0 0 0 1px rgba(255,255,255,.18),0 18px 48px rgba(0,0,0,.18);
    }

    .world-map-bg {
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:fill;
      z-index:1;
      user-select:none;
      pointer-events:none;
    }

    .world-map-content,
    .image-land-hotspots {
      position:absolute;
      inset:0;
      z-index:10;
    }

    .world-zone,
    .image-hotspot {
      position:absolute;
      transform:translate(-50%,-50%);
      background:rgba(255,255,255,0);
      border:0;
      border-radius:28px;
      cursor:pointer;
      z-index:15;
      min-width:64px;
      min-height:64px;
      pointer-events:auto;
    }

    .world-zone:active,
    .image-hotspot:active {
      background:rgba(255,255,255,.18);
      transform:translate(-50%,-50%) scale(.96);
    }

    .zone-label {
      position:absolute;
      top:-32px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,.68);
      color:#fff;
      padding:5px 13px;
      border-radius:20px;
      font-size:clamp(11px,2.8vw,15px);
      font-weight:900;
      white-space:nowrap;
      backdrop-filter:blur(8px);
      border:2px solid rgba(255,255,255,.22);
      pointer-events:none;
      letter-spacing:.3px;
      box-shadow:0 3px 8px rgba(0,0,0,.25);
    }

    .zone-emoji-fallback {
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      font-size:clamp(34px,8vw,58px);
      display:none;
      text-shadow:0 2px 4px rgba(0,0,0,.3);
      pointer-events:none;
    }

    .world-map-screen.map-fallback .zone-emoji-fallback,
    .image-land-screen.map-fallback .zone-emoji-fallback {
      display:block;
    }

    .train-sprite {
      position:absolute;
      width:clamp(62px,13vw,94px);
      height:clamp(62px,13vw,94px);
      transform:translate(-50%,-50%);
      transition:left 1.15s cubic-bezier(.4,0,.2,1),top 1.15s cubic-bezier(.4,0,.2,1);
      z-index:25;
      pointer-events:none;
      filter:drop-shadow(0 8px 12px rgba(0,0,0,.35));
      display:grid;
      place-items:center;
    }

    .train-emoji {
      font-size:clamp(54px,12vw,82px);
      line-height:1;
      z-index:2;
    }

    .train-sprite img {
      position:absolute;
      width:100%;
      height:100%;
      z-index:3;
      object-fit:contain;
    }

    .sihyeon-avatar {
      position:absolute;
      bottom:2%;
      left:50%;
      transform:translateX(-50%);
      width:clamp(64px,12vw,86px);
      height:clamp(64px,12vw,86px);
      background:#fff;
      border:4px solid #fff;
      border-radius:50%;
      box-shadow:0 6px 12px rgba(0,0,0,.25);
      z-index:30;
      pointer-events:none;
      overflow:hidden;
      transition:left .6s ease-in-out,top .6s ease-in-out,transform .25s ease;
    }

    .sihyeon-avatar img {
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      border-radius:50%;
      z-index:3;
      display:block;
    }

    .avatar-emoji {
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      font-size:clamp(42px,9vw,56px);
      z-index:2;
    }

    .sihyeon-avatar.is-walking {
      animation:avatarBounce .34s ease-in-out infinite;
    }

    @keyframes avatarBounce {
      0%,100% { translate:0 0; }
      50% { translate:0 -11px; }
    }

    .map-character,
    .land-character {
      position:absolute;
      transform:translate(-50%,-50%);
      width:clamp(72px,16vw,110px);
      height:clamp(72px,16vw,110px);
      border-radius:50%;
      border:4px solid rgba(255,255,255,.96);
      background:rgba(255,255,255,.72);
      box-shadow:0 8px 14px rgba(0,0,0,.22), inset 0 2px 0 rgba(255,255,255,.65);
      display:grid;
      place-items:center;
      cursor:pointer;
      pointer-events:auto;
      transition:transform .15s ease,box-shadow .15s ease;
      overflow:hidden;
    }

    .map-character { z-index:21; }
    .land-character { z-index:18; }

    .map-character:active,
    .land-character:active {
      transform:translate(-50%,-50%) scale(.92);
      box-shadow:0 4px 8px rgba(0,0,0,.2), inset 0 2px 0 rgba(255,255,255,.65);
    }

    .map-character img,
    .land-character img,
    .land-sihyeon-runner img {
      width:100%;
      height:100%;
      object-fit:cover;
      border-radius:50%;
      display:block;
      pointer-events:none;
    }

    .character-emoji-fallback {
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      font-size:clamp(34px,8vw,54px);
      background:rgba(255,255,255,.86);
      pointer-events:none;
    }

    .map-character img:not([style*="display: none"]) + .character-emoji-fallback,
    .land-character img:not([style*="display: none"]) + .character-emoji-fallback,
    .land-sihyeon-runner img:not([style*="display: none"]) + .character-emoji-fallback {
      display:none;
    }

    .character-name-badge {
      position:absolute;
      top:calc(100% + 5px);
      left:50%;
      transform:translateX(-50%);
      background:rgba(255,255,255,.92);
      color:var(--ink);
      padding:3px 10px;
      border-radius:12px;
      font-size:clamp(10px,2.5vw,13px);
      font-weight:900;
      white-space:nowrap;
      box-shadow:0 2px 6px rgba(0,0,0,.18);
      pointer-events:none;
    }

    .land-sihyeon-runner {
      position:absolute;
      left:50%;
      top:88%;
      transform:translate(-50%,-50%);
      width:clamp(60px,12vw,84px);
      height:clamp(60px,12vw,84px);
      border-radius:50%;
      border:4px solid #fff;
      background:#fff;
      box-shadow:0 8px 14px rgba(0,0,0,.24);
      z-index:26;
      display:grid;
      place-items:center;
      overflow:hidden;
      pointer-events:none;
      transition:left .85s cubic-bezier(.25,.9,.3,1),top .85s cubic-bezier(.25,.9,.3,1),transform .85s cubic-bezier(.25,.9,.3,1);
    }

    .land-sihyeon-runner.is-moving {
      transform:translate(-50%,-50%) scale(1.06);
    }

    .mic-button-floating,
    .btn-parent-lock {
      position:absolute;
      border:4px solid #fff;
      display:grid;
      place-items:center;
      box-shadow:0 8px 16px rgba(0,0,0,.25);
      z-index:50;
    }

    .mic-button-floating {
      bottom:calc(18px + env(safe-area-inset-bottom));
      right:18px;
      width:clamp(64px,12vw,78px);
      height:clamp(64px,12vw,78px);
      border-radius:50%;
      background:linear-gradient(135deg,#FF7A1A,#E65100);
      color:#fff;
      font-size:clamp(30px,7vw,38px);
    }

    .btn-parent-lock {
      top:max(16px,env(safe-area-inset-top));
      right:16px;
      width:44px;
      height:44px;
      border-radius:50%;
      background:rgba(255,255,255,.85);
      font-size:20px;
    }

    @media (min-aspect-ratio:9/16) { .world-map-frame { height:100dvh; width:auto; } }
    @media (max-aspect-ratio:9/16) { .world-map-frame { width:100vw; height:auto; } }


    .world-map-screen.is-landscape-home .world-map-frame {
      aspect-ratio:16/9;
    }

    .world-map-screen.is-landscape-home .world-map-bg {
      object-fit:fill;
    }

    .world-map-screen.is-landscape-home .zone-label,
    .world-map-screen.is-portrait-art-home .zone-label {
      display:none;
    }

    .world-map-screen.is-landscape-home.map-fallback .zone-label,
    .world-map-screen.is-portrait-art-home.map-fallback .zone-label {
      display:block;
    }

    .sihyeon-avatar.home-art-avatar {
      opacity:0;
    }

    .sihyeon-avatar.home-art-avatar.is-walking {
      opacity:1;
    }

    @media (orientation:landscape) {
      .world-map-screen.is-landscape-home .world-map-frame {
        width:min(100vw, calc(100dvh * 16 / 9));
        height:auto;
      }
    }

    @media (orientation:landscape) and (min-aspect-ratio:16/9) {
      .world-map-screen.is-landscape-home .world-map-frame {
        height:100dvh;
        width:auto;
      }
    }

    @media (orientation:portrait) {
      .world-map-screen.is-portrait-art-home .world-map-frame {
        aspect-ratio:9/16;
      }
    }

    .fullscreen-zone {
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      z-index:2;
      animation:zoneEnter .35s cubic-bezier(.25,.9,.3,1) both;
    }

    @keyframes zoneEnter {
      from { opacity:0; transform:scale(.96); }
      to { opacity:1; transform:scale(1); }
    }

    .zone-sky-bg {
      position:absolute;
      inset:0;
      z-index:0;
    }

    .zone-card-land .world-blur-bg { opacity:.72; }
    .zone-card-land .zone-sky-bg { opacity:0; }

    .zone-card-land .image-land-bg {
      position:absolute;
      inset:0;
      z-index:1;
      width:100%;
      height:100%;
      object-fit:cover;
      pointer-events:none;
      filter:saturate(1.04) contrast(1.02);
    }

    .zone-card-land::after {
      content:"";
      position:absolute;
      inset:0;
      z-index:2;
      pointer-events:none;
      background:linear-gradient(180deg,rgba(0,0,0,.04),rgba(0,0,0,.12));
    }

    .zone-card-land .zone-head,
    .zone-card-land .zone-character-strip,
    .zone-card-land .zone-body {
      z-index:5;
    }

    .deco-sun {
      position:absolute;
      top:18px;
      right:22px;
      width:88px;
      height:88px;
      border-radius:50%;
      background:radial-gradient(circle,#FFF176 0 38%,#FFD93D 40% 65%,transparent 66%);
      box-shadow:0 0 48px rgba(255,200,0,.55);
      z-index:1;
      animation:sunPulse 4s ease-in-out infinite;
    }

    @keyframes sunPulse {
      0%,100% { box-shadow:0 0 48px rgba(255,200,0,.55); }
      50% { box-shadow:0 0 72px rgba(255,200,0,.75); }
    }

    .zone-head {
      position:relative;
      z-index:80;
      display:flex;
      align-items:center;
      padding:max(14px,env(safe-area-inset-top)) 16px 10px;
      flex-shrink:0;
      pointer-events:none;
    }

    .zone-home-btn {
      flex-shrink:0;
      padding:0 18px;
      height:56px;
      border-radius:28px;
      background:linear-gradient(180deg,#fff 0%,#ffe577 100%);
      border:4px solid #fff;
      font-size:22px;
      font-weight:900;
      color:var(--ink);
      display:flex;
      align-items:center;
      gap:6px;
      box-shadow:0 6px 0 rgba(0,0,0,.18),0 10px 20px rgba(0,0,0,.1);
      transition:transform .1s,box-shadow .1s;
      pointer-events:auto;
    }

    .zone-home-btn:active {
      transform:translateY(4px);
      box-shadow:0 2px 0 rgba(0,0,0,.18);
    }

    .zone-title {
      margin-left:auto;
      font-size:clamp(22px,5.5vw,34px);
      color:#fff;
      text-shadow:0 3px 0 rgba(0,0,0,.2);
    }

    .zone-body {
      position:relative;
      z-index:5;
      flex:1;
      overflow-y:auto;
      overflow-x:hidden;
      padding:10px 16px max(18px,env(safe-area-inset-bottom));
    }

    .zone-body::-webkit-scrollbar { display:none; }

    .zone-character-strip {
      position:relative;
      z-index:10;
      flex-shrink:0;
      display:flex;
      align-items:flex-end;
      justify-content:flex-start;
      padding:10px 18px 0;
      gap:14px;
    }

    .zone-guide-avatar,
    .zone-guide-avatar-emoji {
      width:clamp(68px,15vw,88px);
      height:clamp(68px,15vw,88px);
      border-radius:50%;
      border:4px solid #fff;
      box-shadow:0 6px 12px rgba(0,0,0,.22);
      flex-shrink:0;
    }

    .zone-guide-avatar { object-fit:cover; }

    .zone-guide-avatar-emoji {
      background:rgba(255,255,255,.9);
      display:grid;
      place-items:center;
      font-size:clamp(38px,9vw,52px);
    }

    .zone-speech-bubble {
      background:#fff;
      border-radius:18px 18px 18px 4px;
      padding:10px 16px;
      font-size:clamp(14px,3.8vw,19px);
      font-weight:700;
      color:var(--ink);
      box-shadow:0 4px 0 rgba(0,0,0,.1);
      max-width:220px;
      line-height:1.4;
    }

    .zone-game-grid {
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:clamp(12px,3vw,18px);
      padding:12px 0 max(18px,env(safe-area-inset-bottom));
      align-content:center;
      min-height:100%;
    }

    .zone-game-card {
      position:relative;
      background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(255,252,232,.95));
      border-radius:28px;
      border:5px solid #fff;
      box-shadow:0 10px 0 rgba(0,0,0,.14),0 16px 26px rgba(0,0,0,.12);
      padding:14px 12px 16px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      cursor:pointer;
      transition:transform .14s ease,box-shadow .14s ease,border-color .14s ease;
      min-height:218px;
      -webkit-tap-highlight-color:transparent;
    }

    .zone-game-card:active {
      transform:scale(.98) translateY(3px);
      box-shadow:0 4px 0 rgba(0,0,0,.13),0 8px 16px rgba(0,0,0,.1);
    }

    .zgc-icon {
      width:100%;
      flex:1 1 auto;
      min-height:112px;
      border-radius:22px;
      display:grid;
      place-items:center;
      overflow:hidden;
      background:linear-gradient(180deg,#E0F7FA 0%,#FFF6C7 100%);
      box-shadow:inset 0 -5px 0 rgba(0,0,0,.06);
      font-size:clamp(66px,18vw,104px);
      line-height:1;
    }

    .zgc-image {
      width:100%;
      height:100%;
      min-height:112px;
      object-fit:cover;
      display:block;
    }

    .zgc-emoji-fallback {
      width:100%;
      height:100%;
      min-height:112px;
      display:grid;
      place-items:center;
    }

    .zgc-title {
      width:100%;
      font-size:clamp(19px,4.9vw,27px);
      font-weight:900;
      color:var(--ink);
      text-align:center;
      line-height:1.08;
    }

    .zgc-desc {
      width:100%;
      font-size:clamp(13px,3.35vw,16px);
      color:#666;
      text-align:center;
      line-height:1.28;
      min-height:2.55em;
      display:flex;
      align-items:flex-start;
      justify-content:center;
    }

    .zgc-new {
      position:absolute;
      top:-6px;
      right:-6px;
      background:#FF4444;
      color:#fff;
      font-size:11px;
      font-weight:900;
      padding:3px 8px;
      border-radius:10px;
      border:2px solid #fff;
    }

    .zone-game-card-empty {
      border-radius:28px;
      min-height:218px;
      background:rgba(255,255,255,.1);
      border:4px dashed rgba(255,255,255,.22);
      pointer-events:none;
    }

    /* GAME CARD GRID — 모바일 3열 / 태블릿 4열 */
    @media (max-width:767px) and (orientation:portrait) {
      .zone-game-grid {
        grid-template-columns:repeat(3,minmax(0,1fr));
        gap:9px;
        align-content:start;
        padding:8px 0 max(16px,env(safe-area-inset-bottom));
      }

      .zone-game-card {
        min-height:148px;
        padding:8px 6px 10px;
        border-radius:20px;
        border-width:4px;
        box-shadow:0 6px 0 rgba(0,0,0,.13),0 10px 18px rgba(0,0,0,.1);
      }

      .zone-game-card-empty {
        min-height:148px;
        border-radius:20px;
      }

      .zgc-icon {
        min-height:74px;
        border-radius:16px;
        font-size:clamp(42px,13vw,64px);
      }

      .zgc-image,
      .zgc-emoji-fallback {
        min-height:74px;
      }

      .zgc-title {
        font-size:clamp(13px,3.7vw,17px);
        line-height:1.08;
      }

      .zgc-desc {
        font-size:clamp(10px,2.8vw,12px);
        line-height:1.18;
        min-height:2.35em;
      }

      .zgc-new {
        top:-5px;
        right:-5px;
        font-size:9px;
        padding:2px 6px;
      }
    }

    @media (max-width:360px) and (orientation:portrait) {
      .zone-game-grid {
        grid-template-columns:repeat(2,minmax(0,1fr));
        gap:10px;
      }

      .zone-game-card,
      .zone-game-card-empty {
        min-height:176px;
      }

      .zgc-icon,
      .zgc-image,
      .zgc-emoji-fallback {
        min-height:92px;
      }

      .zgc-title {
        font-size:clamp(16px,4.8vw,21px);
      }

      .zgc-desc {
        font-size:clamp(12px,3.2vw,14px);
      }
    }

    @media (min-width:768px) and (orientation:landscape) {
      .zone-game-grid {
        grid-template-columns:repeat(4,minmax(0,1fr));
        gap:18px;
        align-content:center;
        padding:14px 0 max(18px,env(safe-area-inset-bottom));
      }

      .zone-game-card {
        min-height:clamp(220px,34vh,320px);
        padding:14px 12px 16px;
        border-radius:30px;
      }

      .zone-game-card-empty {
        min-height:clamp(220px,34vh,320px);

}

const WORLD_ZONES_PORTRAIT = {

const ZONE_PATHS_PORTRAIT = {
  game: [ {x:'50%',y:'88%'}, {x:'50%',y:'80%'}, {x:'47%',y:'72%'}, {x:'42%',y:'64%'}, {x:'37%',y:'55%'}, {x:'33%',y:'45%'}, {x:'30%',y:'34%'}, {x:'29%',y:'23%'} ],
  numbers: [ {x:'50%',y:'88%'}, {x:'50%',y:'80%'}, {x:'53%',y:'72%'}, {x:'58%',y:'64%'}, {x:'63%',y:'56%'}, {x:'67%',y:'46%'}, {x:'70%',y:'35%'}, {x:'72%',y:'24%'} ],
  letters: [ {x:'50%',y:'88%'}, {x:'45%',y:'84%'}, {x:'40%',y:'79%'}, {x:'36%',y:'73%'}, {x:'32%',y:'66%'}, {x:'29%',y:'59%'}, {x:'27%',y:'52%'}, {x:'27%',y:'47%'} ],
  cars: [ {x:'50%',y:'88%'}, {x:'55%',y:'84%'}, {x:'60%',y:'79%'}, {x:'64%',y:'73%'}, {x:'68%',y:'66%'}, {x:'71%',y:'59%'}, {x:'73%',y:'53%'}, {x:'73%',y:'49%'} ],
  story: [ {x:'50%',y:'88%'}, {x:'45%',y:'86%'}, {x:'40%',y:'84%'}, {x:'35%',y:'81%'}, {x:'31%',y:'78%'}, {x:'29%',y:'74%'} ],

const ZONE_PATHS_LANDSCAPE = {
  game: [ {x:'50%',y:'78%'}, {x:'43%',y:'68%'}, {x:'35%',y:'57%'}, {x:'27%',y:'43%'}, {x:'17%',y:'25%'} ],
  numbers: [ {x:'50%',y:'78%'}, {x:'57%',y:'66%'}, {x:'66%',y:'52%'}, {x:'75%',y:'38%'}, {x:'83%',y:'24%'} ],
  letters: [ {x:'50%',y:'78%'}, {x:'42%',y:'72%'}, {x:'33%',y:'65%'}, {x:'24%',y:'59%'}, {x:'17%',y:'53%'} ],
  cars: [ {x:'50%',y:'78%'}, {x:'58%',y:'72%'}, {x:'66%',y:'65%'}, {x:'72%',y:'60%'}, {x:'77%',y:'55%'} ],
  story: [ {x:'50%',y:'78%'}, {x:'42%',y:'82%'}, {x:'32%',y:'84%'}, {x:'24%',y:'82%'}, {x:'18%',y:'80%'} ],
  voice: [ {x:'50%',y:'78%'}, {x:'60%',y:'82%'}, {x:'69%',y:'84%'}, {x:'75%',y:'82%'}, {x:'79%',y:'80%'} ],
};

const ZONE_PATHS = ZONE_PATHS_PORTRAIT;

function getZonePaths() {
  return isLandscapeHomeMode() ? ZONE_PATHS_LANDSCAPE : ZONE_PATHS_PORTRAIT;
}

function getZonePath(zoneId) {
  return getZonePaths()[zoneId] || ZONE_PATHS_PORTRAIT[zoneId];
}

const WALK_MIN_STEP_MS = 260;
const WALK_MAX_STEP_MS = 560;
const WALK_SPEED_PER_PERCENT = 46;
const WALK_ENTER_BUFFER_MS = 520;

function clampWalkMs(v) {
  return Math.max(WALK_MIN_STEP_MS, Math.min(WALK_MAX_STEP_MS, Math.round(v)));
}

function percentDistance(a, b) {
  const ax = parseFloat(a.x);
  const ay = parseFloat(a.y);
  const bx = parseFloat(b.x);
  const by = parseFloat(b.y);
  if (![ax, ay, bx, by].every(Number.isFinite)) return 8;
  const dx = bx - ax;
  const dy = by - ay;
  return Math.sqrt(dx * dx + dy * dy);
}

function getWalkStepDuration(prev, next) {
  return clampWalkMs(percentDistance(prev, next) * WALK_SPEED_PER_PERCENT);
}

function estimateWalkDuration(zoneId) {
  const path = getZonePath(zoneId);
  if (!Array.isArray(path) || path.length < 2) return 900;
  let total = 0;
  for (let i = 1; i < path.length; i++) {
    total += getWalkStepDuration(path[i - 1], path[i]);
  }
  return total + WALK_ENTER_BUFFER_MS;

function clone(v){ return JSON.parse(JSON.stringify(v)); }

function mergeDefaults(target, defaults){
  if(!target||typeof target!=='object') target={};
  Object.keys(defaults).forEach(key=>{
    const sv=defaults[key], tv=target[key];
    if(Array.isArray(sv)){ if(!Array.isArray(tv)) target[key]=[]; return; }
    if(sv&&typeof sv==='object'){ target[key]=mergeDefaults(tv,sv); return; }
    if(tv===undefined||tv===null) target[key]=sv;
  });
  return target;
}

function loadStoredDB(){
  try{
    const raw=localStorage.getItem(DB_KEY);
    if(!raw) return clone(DEFAULT_DB);
    return mergeDefaults(JSON.parse(raw), clone(DEFAULT_DB));
  }catch(e){ return clone(DEFAULT_DB); }
}

function loadDB(){ window.db=loadStoredDB(); return window.db; }
let db=loadDB(); window.db=db;

function getToday(){ return new Date().toISOString().slice(0,10); }

function escapeHtml(v){
  return String(v??'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

function refreshLegacyCompatibility(){
  db.progress=db.progress||{level:1,exp:0};
  db.playground=db.playground||{};
  db.playground.collection=Array.isArray(db.playground.collection)?db.playground.collection:[];
  db.playground.storyWorld=mergeDefaults(db.playground.storyWorld,clone(DEFAULT_DB.playground.storyWorld));
  db.settings=mergeDefaults(db.settings,clone(DEFAULT_DB.settings));
  db.parentLog=db.parentLog||{daily:{}};
  const todayStr=getToday();
  if(!db.parentLog.daily[todayStr]){
    db.parentLog.daily[todayStr]={totalMinutes:0,timerCount:0,launchCount:0,landsVisited:[],storiesWatched:[]};
  }
  if(db.parentLog.daily[todayStr].launchCount===undefined) db.parentLog.daily[todayStr].launchCount=0;
}

function save(){
  refreshLegacyCompatibility();
  localStorage.setItem(DB_KEY,JSON.stringify(db));
}

function isStoryPlaying(){ return Boolean(window.storyReadState&&window.storyReadState.isReading); }

function speakText(text,opts={}){
  if(!text||!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR';
  u.rate=opts.rate||db.settings.voiceGuide.rate||0.82;
  u.pitch=opts.pitch||db.settings.voiceGuide.pitch||1.04;
  window.speechSynthesis.speak(u);
}

function playVoiceGuide(id,text,force=false){
  if(!force&&isStoryPlaying()) return;
  if(!db.settings.voiceGuide.enabled) return;
  if(window.SihyeonVoice&&typeof window.SihyeonVoice.play==='function'){
    window.SihyeonVoice.play(id,'',{rate:0.82,pitch:1.04}).catch(()=>{});
  }
}

function fireConfetti(){
  const c=document.getElementById('particle-container');
  if(!c) return;
  const colors=['#FFD93D','#FF7A1A','#FF4D4D','#3478F6','#8E5CFF','#00C2A8','#FF7AC8'];
  for(let i=0;i<50;i++){
    const d=document.createElement('div');
    d.className='particle';
    const s=Math.random()*13+8;
    d.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}vw;top:-24px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${Math.random()*1.4+1.4}s;animation-delay:${Math.random()*0.3}s;border-radius:${Math.random()>0.5?'50%':'4px'}`;
    c.appendChild(d);
    setTimeout(()=>d.remove(),3600);
  }
}

function gainExp(amount){
  db.progress.exp=Number(db.progress.exp||0)+Number(amount||0);
  while(db.progress.exp>=100){
    db.progress.level=Number(db.progress.level||1)+1;
    db.progress.exp-=100;
    fireConfetti();
    playVoiceGuide('common.levelUp','레벨이 올라갔어. 시현이 참 잘했어.');
  }
  save();
}

function travelToZone(zoneId){
  const zone=WORLD_ZONES[zoneId];
  if(!zone) return;

  if(window.stopStoryReading) window.stopStoryReading(true);
  stopSpeaking();
  cleanupActiveGame();

  const todayStr=getToday();
  if(db.parentLog&&db.parentLog.daily[todayStr]){
    const landName=`${zone.emoji} ${zone.label}`;
    if(!db.parentLog.daily[todayStr].landsVisited.includes(landName)){
      db.parentLog.daily[todayStr].landsVisited.push(landName);
      save();
    }
  }

  playVoiceSequenceGuide([
    [LAND_VOICE_IDS[zoneId],zone.label],
    ['common.walkToZone',`시현이가 ${zone.label}으로 걸어가요. 하나, 둘. 하나, 둘.`]
  ],true);

  let entered=false;
  const safeEnter=()=>{
    if(entered) return;
    entered=true;
    enterZone(zoneId);
  };

  const totalMs=estimateWalkDuration(zoneId);
  walkAvatarToZone(zoneId,safeEnter);
  setTimeout(safeEnter,totalMs);
}

function walkAvatarToZone(zoneId,onComplete){
  const avatar=document.getElementById('sihyeonAvatar');
  if(!avatar){ onComplete?.(); return; }

  const path=getZonePath(zoneId);
  if(!path||!path.length){ onComplete?.(); return; }

  avatar.style.transition='none';
  avatar.style.bottom='auto';
  avatar.style.zIndex='35';
  avatar.style.left=path[0].x;
  avatar.style.top=path[0].y;
  avatar.style.transform='translate(-50%, -50%)';

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    avatar.classList.add('is-walking');
    let idx=1;

    function step(){
      if(idx>=path.length){
        avatar.classList.remove('is-walking');
        avatar.style.transform='translate(-50%, -50%) scale(1.06)';
        setTimeout(()=>onComplete?.(),120);
        return;
      }

      const wp=path[idx];
      const prev=path[idx-1];
      const goLeft=parseFloat(wp.x)<parseFloat(prev.x);
      const stepMs=getWalkStepDuration(prev,wp);

      avatar.style.transition=`left ${stepMs}ms ease-in-out, top ${stepMs}ms ease-in-out, transform 0.18s ease`;
      avatar.style.left=wp.x;
      avatar.style.top=wp.y;
      avatar.style.transform=`translate(-50%, -50%) scaleX(${goLeft ? -1 : 1})`;

      idx++;
      setTimeout(step,stepMs+24);
    }

    step();
  }));
}

function initGarageRound(){
  const stage=document.getElementById('garageStage');
  const target=document.getElementById('garageTarget');
  const part=document.getElementById('garagePart');
  const message=document.getElementById('garageMessage');
  if(!stage||!target||!part||!message) return;

  const carIcon=CARS[Math.floor(Math.random()*CARS.length)];
  part.textContent=carIcon;
  target.classList.remove('filled');
  target.textContent='여기에 쏙!';
  message.textContent='자동차를 빈칸까지 끌고 가 보자!';
  part.style.cssText='left:20px;bottom:80px;transform:none;pointer-events:auto;';

  let dragging=false,pointerId=null;

  const movePart=(cx,cy)=>{
    const sr=stage.getBoundingClientRect(),pr=part.getBoundingClientRect();
    const nl=Math.max(0,Math.min(sr.width-pr.width,cx-sr.left-pr.width/2));
    const nt=Math.max(0,Math.min(sr.height-pr.height,cy-sr.top-pr.height/2));
    part.style.left=`${nl}px`;
    part.style.top=`${nt}px`;
    part.style.bottom='auto';
  };

  const onDown=(e)=>{
    dragging=true;
    pointerId=e.pointerId;
    part.setPointerCapture(e.pointerId);
    movePart(e.clientX,e.clientY);
  };

  const onMove=(e)=>{
    if(!dragging||e.pointerId!==pointerId) return;
    e.preventDefault();
    movePart(e.clientX,e.clientY);
  };

  const onUp=(e)=>{
    if(!dragging||e.pointerId!==pointerId) return;
    dragging=false;
    if(part.hasPointerCapture(pointerId)) part.releasePointerCapture(pointerId);

    const tr=target.getBoundingClientRect(),pr2=part.getBoundingClientRect();
    const hit=!(pr2.right<tr.left-30||pr2.left>tr.right+30||pr2.bottom<tr.top-30||pr2.top>tr.bottom+30);

    if(!hit){
      message.textContent='조금만 더 가까이!';
      playVoiceGuide('games.car.wrong','시현아, 그건 지금 안 필요해. 반짝이는 걸 눌러볼까?');
      return;
    }

    target.classList.add('filled');
    target.textContent=carIcon;
    part.style.pointerEvents='none';
    part.style.left=`${target.offsetLeft-part.offsetWidth/2}px`;
    part.style.top=`${target.offsetTop-part.offsetHeight/2}px`;
    part.style.transform='scale(1.2)';
    message.textContent='착! 자동차가 딱 맞았어! 🎉';
    fireConfetti();
    playVoiceGuide('games.car.complete','시현아, 자동차가 출발한다! 안녕.');
    gainExp(15);
    unlockCar(carIcon);
    setTimeout(()=>{ if(document.getElementById('garageStage')) initGarageRound(); },1400);
  };

  part.addEventListener('pointerdown',onDown);
  part.addEventListener('pointermove',onMove);
  part.addEventListener('pointerup',onUp);
  part.addEventListener('pointercancel',onUp);

  garageCleanup=()=>{
    part.removeEventListener('pointerdown',onDown);
    part.removeEventListener('pointermove',onMove);
    part.removeEventListener('pointerup',onUp);
    part.removeEventListener('pointercancel',onUp);
  };
}

const STORY_PAGE_SIZE=12;

function _storyCoverEmoji(theme){
  const t=String(theme||'');
  if(t.includes('자동차')) return '🚜';
  if(t.includes('공룡')) return '🦖';
  if(t.includes('우주')) return '🚀';
  if(t.includes('바다')) return '🐳';
  if(t.includes('잠자리')) return '🌙';
  if(t.includes('전래')) return '🐯';
  if(t.includes('이솝')) return '🌿';
  if(t.includes('세계명작')||t.includes('명작')) return '🏰';
  if(t.includes('동물')) return '🐰';
  return '📖';
}

function renderStoryGrid(theme){
  window.currentStoryFilter=theme||'전체';
  window._storyPage=1;
  document.querySelectorAll('[data-theme]').forEach(b=>{
    b.classList.toggle('active',b.dataset.theme===(theme||'전체'));
  });
  const si=document.getElementById('storySearchInput');
  if(si) si.value='';
  _renderStoryGridPage(theme,'');
}

function _renderStoryGridPage(theme,query){
  const grid=document.getElementById('storyLibraryGrid');
  if(!grid) return;

  const reader=document.getElementById('storyReaderView');
  if(reader){ reader.style.display='none'; reader.classList.remove('active'); }

  grid.style.display='grid';
  grid.className='story-card-grid storybook-featured-grid';

  document.querySelector('.story-search-row')?.classList.remove('story-ui-hidden');
  document.querySelector('.story-filter-row')?.classList.remove('story-ui-hidden');

  const library=Array.isArray(window.STORY_LIBRARY)?window.STORY_LIBRARY:[];
  const saved=Array.isArray(db.playground.storyWorld.savedStories)?db.playground.storyWorld.savedStories:[];
  const filter=theme||window.currentStoryFilter||'전체';
  const q=(query||'').trim().toLowerCase();
  const page=window._storyPage||1;

  let list;
  if(filter==='저장한 동화'){
    list=saved;
  }else{
    list=library.filter(s=>{
      if(filter!=='전체'&&!String(s.theme||'').includes(filter)) return false;
      if(q){
        const haystack=(s.title+' '+(s.desc||'')+' '+(s.theme||'')+' '+(s.plotSeed||'')).toLowerCase();
        return haystack.includes(q);
      }
      return true;
    });
  }

  const total=list.length;
  const paged=list.slice(0,page*STORY_PAGE_SIZE);

  if(!paged.length){
    grid.innerHTML=`<div class="story-empty">📚 "찾는 동화"가 없어요</div>`;
    const btn=document.getElementById('storyLoadMoreBtn');
    if(btn) btn.style.display='none';
    return;
  }

  grid.innerHTML=paged.map(story=>{
    const id=story.id||story.savedId;
    const emoji=_storyCoverEmoji(story.theme);
    const img=story.coverImage||'';
    return `
      <button class="storybook-book-card" type="button"
        onclick="readStoryById('${escapeHtml(id)}')"
        aria-label="${escapeHtml(story.title)} 읽기">
        <span class="storybook-book-cover">
          ${img ? `<img src="${img}" alt="${escapeHtml(story.title)}" loading="lazy" decoding="async" onerror="this.onerror=null;this.style.display='none';this.nextElementSibling.style.display='grid';">` : ''}
          <span class="storybook-book-fallback" ${img?'style="display:none;"':''}>${emoji}</span>
        </span>
        <span class="storybook-book-title">${escapeHtml(story.title)}</span>
      </button>`;
  }).join('');

  const btn=document.getElementById('storyLoadMoreBtn');
  if(btn) btn.style.display=paged.length<total?'block':'none';
}

let currentPin='';

function showPinOverlay(){
  currentPin='';
  const root=document.getElementById('sihyeonPlayOS');
  const div=document.createElement('div');
  div.className='pin-overlay';
  div.id='pinOverlay';
  div.innerHTML=`
    <div class="pin-box">
      <div class="pin-title">🔒 부모님 확인</div>
      <div class="pin-display" id="pinDisplay">_ _ _ _</div>
      <div class="pin-numpad">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-btn" onclick="handlePinPad(${n})">${n}</button>`).join('')}
        <button class="pin-btn" onclick="handlePinPad('C')">C</button>
        <button class="pin-btn" onclick="handlePinPad(0)">0</button>
        <button class="pin-btn" onclick="closePinOverlay()">닫기</button>
      </div>
    </div>`;
  root.appendChild(div);
}

function closePinOverlay(){
  const el=document.getElementById('pinOverlay');
  if(el) el.remove();
}

function handlePinPad(val){
  if(val==='C') currentPin='';
  else if(currentPin.length<4) currentPin+=val;

  const display=document.getElementById('pinDisplay');
  if(display) display.textContent=currentPin.padEnd(4,'_').split('').join(' ');

  if(currentPin.length===4){
    if(currentPin==='0000'){
      closePinOverlay();
      renderParentDashboard();
    }else if(display){
      display.textContent='다시 입력';
      display.style.color='red';
      setTimeout(()=>{
        currentPin='';
        display.textContent='_ _ _ _';
        display.style.color='';
      },800);
    }
  }
}

function renderParentDashboard(){
  const root=document.getElementById('sihyeonPlayOS');
  const todayStr=getToday();
  const todayLog=db.parentLog?.daily[todayStr]||{totalMinutes:0,timerCount:0,launchCount:0,landsVisited:[],storiesWatched:[]};
  const last7Days=[];
  let maxMins=1;

  for(let i=6;i>=0;i--){
    const d=new Date();
    d.setDate(d.getDate()-i);
    const dStr=d.toISOString().slice(0,10);
    const mins=db.parentLog?.daily[dStr]?.totalMinutes||0;
    if(mins>maxMins) maxMins=mins;
    last7Days.push({date:`${d.getMonth()+1}/${d.getDate()}`,mins});
  }

  root.innerHTML=`
    <div class="parent-dash-screen">
      <div class="dash-header">
        <div class="dash-title">🔒 시현이 사용 현황</div>
        <button class="dash-close-btn" onclick="renderWorldMapHome()">닫기</button>
      </div>
      <div class="dash-content">
        <div class="summary-grid">
          <div class="summary-item">
            <div class="summary-val">${todayLog.totalMinutes}분</div>
            <div class="summary-lbl">오늘 사용 시간</div>
          </div>
          <div class="summary-item">
            <div class="summary-val">${todayLog.launchCount||0}번</div>
            <div class="summary-lbl">오늘 앱 실행 횟수</div>
          </div>
          <div class="summary-item" style="grid-column:span 2;">
            <div class="summary-val">Lv.${db.progress.level}</div>
            <div class="summary-lbl">현재 게임 레벨 (경험치: ${db.progress.exp}%)</div>
          </div>
        </div>
        <div class="dash-card">
          <div class="dash-card-title">오늘 방문한 놀이터</div>
          <div class="visited-lands">
            ${todayLog.landsVisited.length ? todayLog.landsVisited.map(l=>`<span class="visited-chip">${l}</span>`).join('') : '<span class="story-empty-lbl">아직 방문한 놀이터가 없어요.</span>'}
          </div>
        </div>
        <div class="dash-card">
          <div class="dash-card-title">오늘 읽은 동화</div>
          <ul class="story-list">
            ${todayLog.storiesWatched.length ? todayLog.storiesWatched.map(s=>`<li>📖 ${escapeHtml(s)}</li>`).join('') : '<li class="story-empty-lbl">아직 읽은 동화가 없어요.</li>'}
          </ul>
        </div>
        <div class="dash-card">
          <div class="dash-card-title">최근 7일 사용 시간 (분)</div>
          <div class="chart-container">
            ${last7Days.map(d=>{
              const h=Math.max((d.mins/maxMins)*100,5);
              return `
                <div class="chart-col">
                  <div class="chart-bar-wrap">
                    <div class="chart-val" style="bottom:${h}%; margin-bottom:4px;">${d.mins}</div>
                    <div class="chart-bar" style="height:${d.mins===0?0:h}%;"></div>
                  </div>
                  <div class="chart-lbl">${d.date}</div>
                </div>`;
            }).join('')}
          </div>
        </div>
      </div>
    </div>`;
}

window.addEventListener('load',()=>{
  const _origClose=window.closeStoryReader;
  window.closeStoryReader=function(){
    if(typeof _origClose==='function') _origClose();
    setTimeout(()=>{
      if(document.getElementById('storyLibraryGrid')){
        window.renderStoryGrid(window.currentStoryFilter||'전체');
      }
    },0);
  };

  setTimeout(()=>{
    const origRead=window.readStoryById;
    if(typeof origRead==='function'){
      window.readStoryById=function(id){
        const story=window.STORY_LIBRARY?.find(s=>s.id===id||s.savedId===id);
        if(story){
          const todayStr=getToday();
          if(db.parentLog&&db.parentLog.daily[todayStr]){
            if(!db.parentLog.daily[todayStr].storiesWatched.includes(story.title)){
              db.parentLog.daily[todayStr].storiesWatched.push(story.title);
              save();
            }
          }
        }
        return origRead.apply(this,arguments);
      };
    }
  },500);

  setTimeout(()=>{
    if(document.getElementById('storyLibraryGrid')&&window.bootStoryWorldIfMounted){
      window.bootStoryWorldIfMounted();
    }
  },0);
});
